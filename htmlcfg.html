<html>
	<head>
		<title>HTML PC Configurator</title>
		<link href="https://fonts.googleapis.com/css?family=Noto+Sans" rel="stylesheet">
		<style>
			body {
			font-family: 'Noto Sans', sans-serif;
			}
		</style>
	</head>
	<body>
		<h1>Choose your configuration</h1>
		<br>
		<img src="comp.png" width="400" height="370" style="float:left">
		<br>
		Storage:
		<br>
		<select>
			<option value="256s">256GB SSD</option>
			<option value="512s">512GB SSD</option>
			<option value="1s">1TB SSD</option>
			<option value="3s">3TB SSD</option>
		</select>
		<br>
		Processor:
		<br>
		<select>
			<option value="i7s700">Intel Core i7-6700HQ</option>
			<option value="i7k500">Intel Core i7-7500U</option>
			<option value="i7k820">Intel Core i7-7820HK</option>
			<option value="i7k820">Intel Core i7-7820HK</option>
		</select>
		<br>
		RAM:
		<br>
		<select>
			<option value="4x2">4GB - 2x2GB</option>
			<option value="4x1">4GB - 1x4GB</option>
			<option value="8x2">8GB - 2x4GB</option>
			<option value="8x1">8GB - 1x8GB</option>
		</select>
	</body>
</html>
