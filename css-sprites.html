<html>
	<head>
		<title>CSS Nyan Cat</title>
		<style>
			.nyancat {
			width: 320px;
			height: 240px;
			background-image: url("https://githubcatw.github.io/nyan-cat.jpg");
			
			-webkit-animation: play .8s steps(12) infinite;
			   -moz-animation: play .8s steps(12) infinite;
				-ms-animation: play .8s steps(12) infinite;
				 -o-animation: play .8s steps(12) infinite;
					animation: play .8s steps(12) infinite;
			}

			@-webkit-keyframes play {
			   from { background-position:    0px; }
				 to { background-position: 3840px; }
			}

			@-moz-keyframes play {
			   from { background-position:    0px; }
				 to { background-position: 3840px; }
			}

			@-ms-keyframes play {
			   from { background-position:    0px; }
				 to { background-position: 3840px; }
			}

			@-o-keyframes play {
			   from { background-position:    0px; }
				 to { background-position: 3840px; }
			}

			@keyframes play {
			   from { background-position:    0px; }
				 to { background-position: 3840px; }
			}
		</style>
	</head>
	<body>
		<div class="nyancat"></div>
	</body>
</html>
