
<html>
<head>
<style>
#div1 {
    width: 670px;
    height: 560px;
    padding: 10px;
    border: 1px solid #aaaaaa;
}
</style>
<script>
function allowDrop(ev) {
    ev.preventDefault();
}

function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
    ev.preventDefault();
    var data = ev.dataTransfer.getData("text");
    ev.target.appendChild(document.getElementById(data));
}
</script>
</head>
<body>


<div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<img id="drag1" src="http://cdn2.gsmarena.com/vv/bigpic/apple-iphone-7r4.jpg" draggable="true" ondragstart="drag(event)">

<img id="drag2" src="https://store.storeimages.cdn-apple.com/4974/as-images.apple.com/is/image/AppleInc/aos/published/images/i/ph/iphone7plus/model/iphone7plus-model-select-201703?wid=236&hei=331&fmt=png-alpha&qlt=95&.v=1489097365504" draggable="true" ondragstart="drag(event)" width="160" height="212">

<img id="drag3" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/IPhone_7_Plus_Jet_Black.svg/1200px-IPhone_7_Plus_Jet_Black.svg.png" draggable="true" ondragstart="drag(event)" width="100" height="212">

<img id="drag4" src="https://images-na.ssl-images-amazon.com/images/I/71XFwTtzHdL._SY445_.jpg" draggable="true" ondragstart="drag(event)" width="100" height="212">

<img id="drag5" src="http://i-cdn.phonearena.com/images/phones/63260-large/Apple-iPhone-7-2.jpg" draggable="true" ondragstart="drag(event)" width="160" height="212">
</body>
</html>
